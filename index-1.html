<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Temperature Converter</h1>

        <input type="text" id="temperature" placeholder="Enter temperature">

        <select id="unit">
            <option value="celsius">Celsius (°C)</option>
            <option value="fahrenheit">Fahrenheit (°F)</option>
            <option value="kelvin">Kelvin (K)</option>
        </select>

        <button onclick="convertTemperature()">Convert</button>

        <div id="result"></div>
    </div>

    <script>
        function convertTemperature() {
            let temp = document.getElementById("temperature").value;
            let unit = document.getElementById("unit").value;
            let result = document.getElementById("result");

            if (temp === "" || isNaN(temp)) {
                result.innerHTML = "Please enter a valid number.";
                return;
            }

            temp = parseFloat(temp);
            let converted = "";

            if (unit === "celsius") {
                let f = (temp * 9/5) + 32;
                let k = temp + 273.15;
                converted = `${temp} °C = ${f.toFixed(2)} °F<br>${temp} °C = ${k.toFixed(2)} K`;
            }
            else if (unit === "fahrenheit") {
                let c = (temp - 32) * 5/9;
                let k = c + 273.15;
                converted = `${temp} °F = ${c.toFixed(2)} °C<br>${temp} °F = ${k.toFixed(2)} K`;
            }
            else {
                let c = temp - 273.15;
                let f = (c * 9/5) + 32;
                converted = `${temp} K = ${c.toFixed(2)} °C<br>${temp} K = ${f.toFixed(2)} °F`;
            }

            result.innerHTML = converted;
        }
    </script>

</body>
</html>
